name: Daily ETF Analysis

on:
  schedule:
    # 【台股排程】台灣時間週一到週五 14:30 執行 (收盤後 1 小時，等於 UTC 06:30)
    - cron: "30 6 * * 1-5"
    # 【美股排程】台灣時間週二到週六 06:30 執行 (確保冬夏令皆安全，等於 UTC 22:30)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: # 允許手動觸發

# 👇 必須加上這段，否則最後的 git push 會失敗
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          fc-cache -fv

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Clear matplotlib font cache
        run: uv run python -c "import matplotlib, shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True)"

      - name: Run ETF analysis
        run: uv run python main.py

      - name: Commit updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 先把產生的圖表與報告加進暫存區
          # 加上 || true 是防止萬一這兩個路徑沒檔案時，不會讓整個 Workflow 崩潰
          git add Report/ docs/index.html || true
          
          # 2. 檢查有沒有檔案變更，有的話才執行 Commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ETF charts $(date -u +%Y-%m-%d)"
            
            # 3. Commit 完後，在 Push 前一刻才做 rebase，確保本地的 commit 疊在最上層
            # -X ours 可以在萬一發生微小衝突時，以這次自動生成的檔案為主
            git pull --rebase -X ours origin ${GITHUB_REF_NAME}
            
            # 4. 推送回目前的 branch
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "沒有偵測到任何圖表更新，跳過 Commit 與 Push。"
          fi
