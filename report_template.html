<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ETF 技術指標報告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#222}
header{background:#16213e;color:#fff;padding:20px 32px}
header h1{font-size:1.5rem;margin-bottom:4px}
header p{font-size:.82rem;opacity:.65}
.wrap{max-width:1440px;margin:0 auto;padding:24px 16px}
.summary{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden;margin-bottom:28px}
.summary h2{padding:12px 20px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:#888;border-bottom:1px solid #f0f0f0}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 20px;text-align:left;border-bottom:1px solid #f5f5f5;font-size:.88rem}
th{color:#aaa;font-weight:500}
td.sid{font-weight:600;font-family:monospace;font-size:.9rem}
.up{color:#e63946;font-weight:700}
.dn{color:#2a9d8f;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(620px,1fr));gap:20px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;background:#1a1a2e;color:#fff}
.card-header .sid{font-weight:700;font-size:.95rem;font-family:monospace;letter-spacing:.03em}
.card-header .ret{font-size:.95rem;font-weight:700}
.card img{width:100%;display:block}
footer{text-align:center;padding:28px;color:#bbb;font-size:.78rem}
footer a{color:#bbb}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>ETF 技術指標分析報告</h1>
  <p>更新時間：%%GENERATED_AT%% &nbsp;|&nbsp; 觀察區間：%%START_DATE%% ～ %%END_DATE%% &nbsp;|&nbsp; %%LOOKBACK_DAYS%% 天</p>
</header>
<div class="wrap">
  <div class="summary">
    <h2>期間報酬率摘要</h2>
    <table>
      <thead><tr><th>股票代號</th><th>期間報酬率</th><th>觀察天數</th></tr></thead>
      <tbody>%%SUMMARY_ROWS%%</tbody>
    </table>
  </div>
  <div class="grid">%%CHART_CARDS%%</div>
</div>
<footer>由 GitHub Actions 自動產生 &nbsp;·&nbsp; <a href="https://github.com">ETF 技術指標分析工具</a></footer>
</body>
</html>
