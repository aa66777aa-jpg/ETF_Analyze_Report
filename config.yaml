# ==========================================
# ETF 定期投入時機分析 — 設定檔
# ==========================================

# 觀察的股票 / 指數清單（^ 開頭視為指數，僅顯示市場環境，不給加碼建議）
stock_list:
  - "009816.TW"   # 國泰台灣 50 ETF
  - "00735.TW"    # 國泰台韓科技
  - "00685L.TW"   # 富邦台灣加權正 2
  - "^TWII"       # 台灣加權指數（市場環境參考）
  - "^KS11"       # 韓國綜合指數（市場環境參考）

# 持倉成本追蹤（選填）
# 填入後報告會顯示持倉損益與停利進度，圖表也會標出成本線與停利目標線
# 不追蹤的股票直接省略即可
holdings:
  "009816.TW":
    cost: 14.16       # 買入成本（元）
    target_pct: 20   # 目標獲利 %，不填預設 20
  "00685L.TW":
    cost: 326.5
    target_pct: 20
