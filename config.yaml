# ==========================================
# ETF 定期投入時機分析 — 設定檔
# ==========================================

# 觀察的股票 / 指數清單（^ 開頭視為指數，僅顯示市場環境，不給加碼建議）
# 反向型 ETF 請同時加入下方 inverse_list，評分邏輯會自動反向
stock_list:
  - "009816.TW"   # 凱基台灣TOP50
  - "00735.TW"    # 國泰台韓科技
  - "00685L.TW"   # 群益臺灣加權正2
  - "00632R.TW"   # 元大台灣50反1
  - "^TWII"       # 台灣加權指數（市場環境參考）
  - "^KS11"       # 韓國綜合指數（市場環境參考）

# 持倉成本追蹤（選填）
# 填入後報告會顯示持倉損益與停利進度，圖表也會標出成本線與停利目標線
# 不追蹤的股票直接省略即可
holdings:
  "009816.TW":
    cost: 14.16       # 買入成本（元）
    target_pct: 20   # 目標獲利 %，不填預設 20
  "00685L.TW":
    cost: 13.6
    target_pct: 10

# 槓桿型 ETF 倍數設定（距高點跌幅與 MA60 偏差閾值會等比放大，避免過早觸發）
# RSI / CMF 是相對指標，不受影響
# 這裡列出的代號同時也要出現在 stock_list
leverage_list:
  "00685L.TW": 2   # 群益臺灣加權正2
  # "00631L.TW": 2   # 元大台灣50正2
  # "TQQQ": 3        # 那斯達克三倍正向

# 反向型 ETF 清單（評分邏輯全部反向：市場過熱才是加碼時機）
# 這裡列出的代號同時也要出現在 stock_list
inverse_list:
  - "00632R.TW"   # 元大台灣50反1
  # - "SQQQ"        # 那斯達克三倍反向
