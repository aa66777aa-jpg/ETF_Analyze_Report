name: Daily ETF Analysis

on:
  schedule:
    # 【台股排程】台灣時間週一到週五 14:30 執行 (收盤後 1 小時，等於 UTC 06:30)
    - cron: "30 6 * * 1-5"
    # 【美股排程】台灣時間週二到週六 06:30 執行 (確保冬夏令皆安全，等於 UTC 22:30)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: # 允許手動觸發

# 👇 必須加上這段，否則最後的 git push 會失敗
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear matplotlib font cache
        run: python -c "import matplotlib, shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True)"

      - name: Run ETF analysis
        run: python ETF.py

      - name: Commit updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Report/*.png
          git diff --cached --quiet || git commit -m "chore: update ETF charts $(date -u +%Y-%m-%d)"
          git push
